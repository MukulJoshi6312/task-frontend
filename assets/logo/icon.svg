<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!--
    Taskly app icon — 1024x1024 (master).
    iOS will round to its own squircle; Android adaptive icons need the
    foreground (checkmark + dot) and background (orange) separated. To export
    those, hide the orange rect for the foreground PNG.
  -->

  <!-- Background squircle in brand orange -->
  <rect x="0" y="0" width="1024" height="1024" rx="228" ry="228" fill="#FF6B4A"/>

  <!--
    Big white checkmark.
    Path = move to the start of the short stroke, line down to the elbow,
    line up to the end of the long stroke. Wide round caps give it warmth.
  -->
  <path d="M 304 552 L 460 708 L 728 360"
        fill="none"
        stroke="#FFFFFF"
        stroke-width="92"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- Small accent dot at the top-right tip — adds energy/sparkle -->
  <circle cx="760" cy="312" r="36" fill="#FFFFFF" opacity="0.85"/>
</svg>
